<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a2a0a"/>
      <stop offset="100%" stop-color="#1a1205"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <!-- estrelas -->
  <circle cx="50" cy="30" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="120" cy="80" r="1" fill="white" opacity="0.6"/>
  <circle cx="200" cy="20" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="350" cy="50" r="1" fill="white" opacity="0.7"/>
  <circle cx="500" cy="30" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="580" cy="90" r="1" fill="white" opacity="0.6"/>
  <circle cx="420" cy="15" r="1" fill="white" opacity="0.9"/>
  <circle cx="80" cy="150" r="1" fill="white" opacity="0.5"/>
  <circle cx="600" cy="200" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="30" cy="300" r="1" fill="white" opacity="0.6"/>
  <circle cx="610" cy="320" r="1" fill="white" opacity="0.8"/>
  <circle cx="280" cy="340" r="1.5" fill="white" opacity="0.5"/>
  <!-- ícone central -->
  <text x="320" y="160" font-size="72" text-anchor="middle" dominant-baseline="middle">🌕</text>
  <!-- título -->
  <text x="320" y="230" font-family="Arial, sans-serif" font-size="22" font-weight="bold"
        fill="white" text-anchor="middle">Buzz Aldrin na Lua</text>
  <!-- subtítulo -->
  <text x="320" y="262" font-family="Arial, sans-serif" font-size="14"
        fill="#a0c0e0" text-anchor="middle">Apollo 11 — 21 Jul 1969</text>
  <!-- borda decorativa -->
  <rect x="2" y="2" width="636" height="356" fill="none" stroke="rgba(100,180,255,0.3)" stroke-width="2" rx="4"/>
  <line x1="240" y1="275" x2="400" y2="275" stroke="rgba(100,180,255,0.4)" stroke-width="1"/>
  <!-- NASA credit -->
  <text x="620" y="348" font-family="Arial, sans-serif" font-size="10"
        fill="rgba(255,255,255,0.3)" text-anchor="end">NASA · Domínio Público</text>
</svg>